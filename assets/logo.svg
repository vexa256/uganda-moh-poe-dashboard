<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Command-centre dual-tone shield for POE Sentinel.
       Deep navy base + teal accent ring + white medical cross. -->
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B2545"/>
      <stop offset="1" stop-color="#13315C"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00B4A6"/>
      <stop offset="1" stop-color="#008F84"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feOffset dx="0" dy="8" result="off"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1024" height="1024" fill="#0B2545"/>

  <!-- Shield outline -->
  <g filter="url(#softShadow)">
    <path d="
        M 512 128
        L 832 232
        L 832 528
        C 832 716 688 848 512 896
        C 336 848 192 716 192 528
        L 192 232 Z"
      fill="url(#shieldGrad)" stroke="url(#ringGrad)" stroke-width="14"/>
  </g>

  <!-- Teal accent ring (inner) -->
  <circle cx="512" cy="508" r="210" fill="none" stroke="url(#ringGrad)" stroke-width="10" stroke-opacity="0.55"/>

  <!-- Public-health cross -->
  <g fill="#FFFFFF">
    <rect x="452" y="348" width="120" height="320" rx="18"/>
    <rect x="352" y="448" width="320" height="120" rx="18"/>
  </g>

  <!-- POE monogram -->
  <g font-family="Inter, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="middle" fill="#FFFFFF">
    <text x="512" y="808" font-size="88" letter-spacing="8">POE</text>
  </g>
</svg>
